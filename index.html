<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>spine-skeleton-comparator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0d0d1a;
        color: #e0e0ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
        display: flex;
        justify-content: center;
      }

      .page {
        width: min(1360px, 100%);
      }

      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #c4b5fd;
        margin: 0;
      }

      .page-header {
        width: min(100%, 1154px);
        margin: 0 auto 18px;
        display: grid;
        grid-template-columns: 56px minmax(0, 850px) 220px;
        align-items: center;
        gap: 14px;
      }

      .header-left {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        grid-column: 1 / 3;
        justify-self: start;
      }

      .compare-btn {
        border: 1px solid #3a3a5a;
        background: #171a2f;
        color: #d8defa;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }

      .compare-btn:hover {
        background: #1f2440;
        border-color: #4f67ad;
      }

      .compare-btn.on {
        background: rgba(125, 211, 252, 0.15);
        border-color: #7dd3fc;
        color: #7dd3fc;
      }

      .version-select {
        justify-self: end;
        min-width: 132px;
        border: 1px solid #3a3a5a;
        background: #171a2f;
        color: #d8defa;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 13px;
        font-family: inherit;
      }

      /* ── Viewer ── */
      .viewer {
        border: 1px solid #2a2a4a;
        border-radius: 10px;
        padding: 18px;
        margin: 0 auto 24px;
        background: #13132a;
      }

      .viewer-caption {
        width: min(100%, 1154px);
        margin: 0 auto 12px;
        display: grid;
        grid-template-columns: 56px minmax(0, 850px) 220px;
        gap: 14px;
        align-items: center;
      }

      .viewer-caption-content {
        grid-column: 2;
        font-size: 12px;
        color: #8b93b8;
        min-height: 18px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .viewer-caption strong {
        color: #d8defa;
        font-weight: 600;
      }

      .caption-status {
        color: #fda4af;
      }

      .playing-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.45);
        flex-shrink: 0;
      }

      .playing-inline {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .viewer-row {
        display: grid;
        grid-template-columns: 56px minmax(0, 850px) 220px;
        gap: 14px;
        justify-content: center;
        align-items: stretch;
        margin-bottom: 14px;
        width: min(100%, 1154px);
        margin-left: auto;
        margin-right: auto;
      }

      .viewer-toolbar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }

      .toolbar-btn {
        width: 56px;
        height: 56px;
        border-radius: 6px;
        border: 1px solid #2f3d63;
        background: #171a2f;
        color: #d8defa;
        cursor: pointer;
        font-size: 24px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, border-color 0.15s, transform 0.15s;
      }

      .toolbar-btn.on {
        background: rgba(250, 204, 21, 0.08);
        border-color: #facc15;
        box-shadow: 0 0 0 1px rgba(250, 204, 21, 0.4) inset, 0 0 12px rgba(250, 204, 21, 0.18);
      }

      .toolbar-btn.text-btn {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .toolbar-icon {
        width: 24px;
        height: 24px;
        object-fit: contain;
        display: block;
      }

      .toolbar-btn:hover {
        background: #1f2440;
        border-color: #4f67ad;
        transform: translateY(-1px);
      }

      .toolbar-btn:active {
        transform: translateY(0);
      }

      .canvas-wrap {
        position: relative;
        border: 1px solid #2a2a4a;
        border-radius: 6px;
        overflow: hidden;
        background: #0a0a1a;
        min-width: 0;
        width: 100%;
        height: 520px;
      }

      .canvas-wrap canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .zoom-indicator {
        position: absolute;
        bottom: 8px;
        right: 10px;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        pointer-events: none;
      }

      /* ── Panels ── */
      .panel {
        background: #13132a;
        border: 1px solid #1e1e3a;
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }

      .anim-panel {
        width: 220px;
        height: 520px;
      }

      .details-bar {
        margin-top: 10px;
        padding: 10px 12px;
        background: #111127;
        border: 1px solid #1e1e3a;
        border-radius: 6px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(220px, 280px) 72px;
        gap: 12px;
        align-items: stretch;
        width: min(100%, 1154px);
        margin-left: auto;
        margin-right: auto;
      }

      .detail-section {
        min-width: 0;
        min-height: 0;
        border-radius: 6px;
        transition: box-shadow 0.15s, background 0.15s;
      }

      .panel-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid #2a2a4a;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .detail-body {
        min-height: 0;
      }

      .panel-title {
        font-size: 11px;
        font-weight: 600;
        color: #a78bfa;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        flex: 1;
      }

      .panel-count {
        font-size: 10px;
        color: #6b7280;
      }

      .panel-count span {
        color: #7dd3fc;
        font-weight: 600;
      }

      .item-list {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
        font-size: 13px;
        line-height: 20px;
      }

      .detail-list {
        height: calc(15 * 20px);
      }

      .item-list li {
        color: #e0e0ff;
        list-style: none;
        white-space: nowrap;
        overflow: visible;
        cursor: pointer;
        border-radius: 3px;
        padding: 1px 4px;
        transition: background 0.1s;
      }

      .list-item-content {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .list-item-bullet {
        color: #7c83a8;
      }

      .item-list li:hover { background: rgba(255,255,255,0.06); }
      .item-list li.active { background: rgba(167, 139, 250, 0.25); color: #c4b5fd; }

      .anim-panel .item-list li { color: #a78bfa; }
      .anim-panel .item-list li.active { color: #c4b5fd; background: rgba(167, 139, 250, 0.2); }
      .bone-list li { color: #7dd3fc; }
      .slot-list li { color: #86efac; }

      .toggle-btn {
        background: transparent;
        border: 1px solid #3a3a5a;
        color: #6b7280;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .toggle-btn.on {
        background: rgba(125, 211, 252, 0.15);
        border-color: #7dd3fc;
        color: #7dd3fc;
      }

      .details-collapse-btn {
        width: 100%;
        height: 100%;
        background: rgba(125, 211, 252, 0.08);
        border: 1px solid #2f3d63;
        color: #c4b5fd;
        font-size: 11px;
        padding: 7px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        text-align: center;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }

      .details-collapse-btn:hover {
        background: rgba(125, 211, 252, 0.14);
        border-color: #4963a5;
      }

      .details-collapse-btn:active {
        background: rgba(125, 211, 252, 0.2);
      }

      .details-toggle-wrap {
        min-height: calc(15 * 20px + 40px);
      }

      .metrics-list {
        list-style: none;
        display: grid;
        gap: 6px;
        font-size: 12px;
        line-height: 1.4;
      }

      .metrics-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .metrics-list li:last-child {
        border-bottom: none;
      }

      .metric-label {
        color: #8b93b8;
      }

      .metric-value {
        color: #f8fafc;
        font-weight: 600;
      }

      .details-bar.collapsed .detail-body {
        display: none;
      }

      .details-bar.collapsed {
        align-items: center;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(220px, 280px) 72px;
      }

      .details-bar.collapsed .panel-header {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }

      .details-bar.collapsed .details-toggle-wrap {
        min-height: 32px;
        display: flex;
        align-items: center;
      }

      .details-bar.collapsed .details-collapse-btn {
        height: 32px;
      }

      .viewer2 .toggle-btn.on {
        background: rgba(244, 114, 182, 0.15);
        border-color: #f472b6;
        color: #f472b6;
      }

      .viewer2 .toolbar-btn:hover {
        border-color: #f472b6;
      }

      .viewer2 .details-collapse-btn:hover {
        border-color: #f472b6;
      }

      .viewer2 .metric-value {
        color: #fcd5f8;
      }

      .viewer2 .compare-btn.on {
        border-color: #f472b6;
        color: #f472b6;
      }

      .compare-diff {
        box-shadow: 0 0 0 1px #facc15 inset, 0 0 12px rgba(250, 204, 21, 0.18);
      }

      /* ── Divider ── */
      .divider {
        border: none;
        border-top: 1px solid #2a2a4a;
        margin: 0 0 20px 0;
      }

      @media (max-width: 1200px) {
        .page-header {
          grid-template-columns: 56px minmax(0, 1fr);
        }

        .header-left {
          grid-column: 1 / -1;
        }

        .version-select {
          grid-column: 1 / -1;
          justify-self: start;
        }

        .viewer-row {
          grid-template-columns: 56px minmax(0, 1fr);
        }

        .viewer-caption {
          grid-template-columns: 56px minmax(0, 1fr);
        }

        .anim-panel {
          width: 100%;
          grid-column: 1 / -1;
        }

        .details-bar {
          grid-template-columns: 1fr;
        }

        .canvas-wrap {
          height: 460px;
        }
      }

      @media (max-width: 768px) {
        body {
          padding: 14px;
        }

        .viewer {
          padding: 14px;
        }

        .canvas-wrap {
          height: 360px;
        }

        .detail-list {
          height: calc(15 * 20px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
    <div class="page-header">
      <div class="header-left">
        <h1>spine-skeleton-comparator</h1>
        <button id="compare-toggle" class="compare-btn" type="button">对比</button>
      </div>
      <select id="runtime-version" class="version-select">
        <option>spine4.2</option>
      </select>
    </div>

    <!-- ══════════ VIEWER 1 ══════════ -->
    <div class="viewer" id="viewer-1">
      <input type="file" id="file-input-1" multiple style="display:none" />
      <div class="viewer-caption">
        <div class="viewer-caption-content" id="viewer-caption-1"></div>
      </div>
      <div class="viewer-row">
        <div class="viewer-toolbar">
          <button id="load-btn-1" class="toolbar-btn" type="button" title="加载 .skel / .atlas / .png"><img class="toolbar-icon" src="./icons/open-file.png" alt="加载文件" /></button>
          <button id="clear-btn-1" class="toolbar-btn" type="button" title="清除当前动画"><img class="toolbar-icon" src="./icons/clear-viewer.png" alt="清除动画" /></button>
          <button id="bg-btn-1" class="toolbar-btn" type="button" title="切换背景色"><img class="toolbar-icon" src="./icons/background-color.png" alt="背景色" /></button>
          <button id="crosshair-btn-1" class="toolbar-btn" type="button" title="十字线"><img class="toolbar-icon" src="./icons/crosshair.png" alt="十字线" /></button>
          <button id="alpha-btn-1" class="toolbar-btn text-btn" type="button" title="预乘 alpha">Alpha</button>
        </div>
        <div id="canvas-wrap-1" class="canvas-wrap">
          <canvas id="canvas-1" width="784" height="450"></canvas>
          <div id="zoom-indicator-1" class="zoom-indicator">100%</div>
        </div>

        <div class="panel anim-panel" id="anim-panel-1">
          <div class="panel-header">
            <span class="panel-title">Animations</span>
            <span class="panel-count"><span id="anim-count-1">0</span> 个</span>
          </div>
          <ul class="item-list" id="anim-list-1"></ul>
        </div>
      </div>

      <div id="details-bar-1" class="details-bar collapsed">
        <div class="detail-section">
          <div class="panel-header">
            <span class="panel-title">Bones</span>
            <button id="toggle-bones-1" class="toggle-btn" type="button">骨骼</button>
            <span class="panel-count"><span id="bone-count-1">0</span> 个</span>
          </div>
          <div class="detail-body">
            <ul class="item-list detail-list bone-list" id="bone-list-1"></ul>
          </div>
        </div>

        <div class="detail-section">
          <div class="panel-header">
            <span class="panel-title">Slots</span>
            <button id="toggle-slots-filter-1" class="toggle-btn" type="button">仅显示有内容</button>
            <span class="panel-count"><span id="slot-count-1">0</span> 个</span>
          </div>
          <div class="detail-body">
            <ul class="item-list detail-list slot-list" id="slot-list-1"></ul>
          </div>
        </div>

        <div class="detail-section">
          <div class="panel-header">
            <span class="panel-title">指标</span>
          </div>
          <div class="detail-body">
            <ul class="metrics-list" id="metrics-list-1"></ul>
          </div>
        </div>

        <div class="details-toggle-wrap">
          <button id="toggle-details-1" class="details-collapse-btn" type="button">展开</button>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <!-- ══════════ VIEWER 2 ══════════ -->
    <div class="viewer viewer2" id="viewer-2">
      <input type="file" id="file-input-2" multiple style="display:none" />
      <div class="viewer-caption">
        <div class="viewer-caption-content" id="viewer-caption-2"></div>
      </div>
      <div class="viewer-row">
        <div class="viewer-toolbar">
          <button id="load-btn-2" class="toolbar-btn" type="button" title="加载 .skel / .atlas / .png"><img class="toolbar-icon" src="./icons/open-file.png" alt="加载文件" /></button>
          <button id="clear-btn-2" class="toolbar-btn" type="button" title="清除当前动画"><img class="toolbar-icon" src="./icons/clear-viewer.png" alt="清除动画" /></button>
          <button id="bg-btn-2" class="toolbar-btn" type="button" title="切换背景色"><img class="toolbar-icon" src="./icons/background-color.png" alt="背景色" /></button>
          <button id="crosshair-btn-2" class="toolbar-btn" type="button" title="十字线"><img class="toolbar-icon" src="./icons/crosshair.png" alt="十字线" /></button>
          <button id="alpha-btn-2" class="toolbar-btn text-btn" type="button" title="预乘 alpha">Alpha</button>
        </div>
        <div id="canvas-wrap-2" class="canvas-wrap">
          <canvas id="canvas-2" width="784" height="450"></canvas>
          <div id="zoom-indicator-2" class="zoom-indicator">100%</div>
        </div>

        <div class="panel anim-panel" id="anim-panel-2">
          <div class="panel-header">
            <span class="panel-title">Animations</span>
            <span class="panel-count"><span id="anim-count-2">0</span> 个</span>
          </div>
          <ul class="item-list" id="anim-list-2"></ul>
        </div>
      </div>

      <div id="details-bar-2" class="details-bar collapsed">
        <div class="detail-section">
          <div class="panel-header">
            <span class="panel-title">Bones</span>
            <button id="toggle-bones-2" class="toggle-btn" type="button">骨骼</button>
            <span class="panel-count"><span id="bone-count-2">0</span> 个</span>
          </div>
          <div class="detail-body">
            <ul class="item-list detail-list bone-list" id="bone-list-2"></ul>
          </div>
        </div>

        <div class="detail-section">
          <div class="panel-header">
            <span class="panel-title">Slots</span>
            <button id="toggle-slots-filter-2" class="toggle-btn" type="button">仅显示有内容</button>
            <span class="panel-count"><span id="slot-count-2">0</span> 个</span>
          </div>
          <div class="detail-body">
            <ul class="item-list detail-list slot-list" id="slot-list-2"></ul>
          </div>
        </div>

        <div class="detail-section">
          <div class="panel-header">
            <span class="panel-title">指标</span>
          </div>
          <div class="detail-body">
            <ul class="metrics-list" id="metrics-list-2"></ul>
          </div>
        </div>

        <div class="details-toggle-wrap">
          <button id="toggle-details-2" class="details-collapse-btn" type="button">展开</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    </div>
  </body>
</html>
